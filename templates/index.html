<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Research Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #238636;
            padding-bottom: 24px;
        }

        header h1 {
            font-size: 2rem;
            color: #3fb950;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        header p {
            color: #8b949e;
            font-size: 0.95rem;
        }

        .examples {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .example-btn {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 16px;
            color: #8b949e;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, color 0.2s;
        }

        .example-btn:hover {
            border-color: #3fb950;
            color: #e6edf3;
        }

        .search-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .search-section label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #3fb950;
        }

        .input-row input::placeholder {
            color: #484f58;
        }

        .input-row button {
            padding: 12px 28px;
            background: #238636;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-row button:hover {
            background: #2ea043;
        }

        .input-row button:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
        }

        .status {
            margin-top: 14px;
            font-size: 0.9rem;
            color: #8b949e;
            min-height: 20px;
        }

        .status.error {
            color: #f85149;
        }

        .report-section {
            display: none;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 32px;
        }

        .report-section.visible {
            display: block;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }

        .report-header h2 {
            font-size: 1.1rem;
            color: #3fb950;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool-calls {
            font-size: 0.8rem;
            color: #8b949e;
            background: #0d1117;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #30363d;
        }

        .report-body {
            line-height: 1.8;
            color: #cdd9e5;
            font-size: 0.95rem;
        }

        .report-body h1,
        .report-body h2,
        .report-body h3 {
            color: #3fb950;
            margin: 20px 0 8px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .report-body p {
            margin-bottom: 12px;
        }

        .report-body strong {
            color: #e6edf3;
        }

        .report-body ul {
            margin: 8px 0 12px 20px;
        }

        .report-body li {
            margin-bottom: 6px;
        }

        .history-section {
            margin-top: 40px;
        }

        .history-section h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 12px;
        }

        .history-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .history-item:hover {
            border-color: #3fb950;
        }

        .history-item .history-goal {
            color: #e6edf3;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .history-item .history-meta {
            color: #484f58;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Stock Research Agent</h1>
            <p>Ask anything about stocks and the agent will research it autonomously</p>
        </header>

        <div class="search-section">
            <label for="goalInput">Research Goal</label>
            <div class="input-row">
                <input
                    type="text"
                    id="goalInput"
                    placeholder="e.g. Research Apple and give me a buy or sell recommendation"
                    autocomplete="off"
                />
                <button id="researchBtn" onclick="runResearch()">Research</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="examples">
            <button class="example-btn" onclick="setGoal('Research Apple and give me a buy or sell recommendation')">Research Apple and give me a buy or sell recommendation</button>
            <button class="example-btn" onclick="setGoal('Compare Tesla and Ford as investments right now')">Compare Tesla and Ford as investments right now</button>
            <button class="example-btn" onclick="setGoal('Should I invest in Microsoft or Google right now?')">Should I invest in Microsoft or Google right now?</button>
        </div>

        <div class="history-section" id="historySection" style="display:none">
            <h2>Past Reports</h2>
            <div id="historyList"></div>
        </div>

        <div class="report-section" id="reportSection">
            <div class="report-header">
                <h2>Research Report</h2>
                <span class="tool-calls" id="toolCallsLabel"></span>
            </div>
            <div class="report-body" id="reportBody"></div>
        </div>
    </div>

    <script>
        document.getElementById("goalInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") runResearch();
        });

        function setGoal(text) {
            document.getElementById("goalInput").value = text;
            runResearch();
        }

        function setStatus(message, isError = false) {
            const status = document.getElementById("status");
            status.textContent = message;
            status.className = "status" + (isError ? " error" : "");
        }

        function formatReport(text) {
            const lines = text.split('\n');
            let html = '';
            for (const line of lines) {
                if (line.startsWith('### ')) {
                    html += `<h3>${line.slice(4)}</h3>`;
                } else if (line.startsWith('## ')) {
                    html += `<h2>${line.slice(3)}</h2>`;
                } else if (line.startsWith('# ')) {
                    html += `<h1>${line.slice(2)}</h1>`;
                } else if (line.startsWith('- ')) {
                    html += `<ul><li>${line.slice(2).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li></ul>`;
                } else if (line.trim() === '') {
                    html += '<br>';
                } else {
                    html += `<p>${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
                }
            }
            return html;
        }

        async function loadHistory() {
            try {
                const res = await fetch("/reports");
                const reports = await res.json();
                const section = document.getElementById("historySection");
                const list = document.getElementById("historyList");
                if (!reports.length) return;
                list.innerHTML = reports.map(r => `
                    <div class="history-item" onclick="showSavedReport(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                        <div class="history-goal">${r.goal}</div>
                        <div class="history-meta">${new Date(r.created_at).toLocaleString()} &middot; ${r.tool_calls} tool calls</div>
                    </div>
                `).join('');
                section.style.display = "block";
            } catch (e) {}
        }

        function showSavedReport(r) {
            const reportSection = document.getElementById("reportSection");
            const reportBody = document.getElementById("reportBody");
            const toolCallsLabel = document.getElementById("toolCallsLabel");
            reportBody.innerHTML = formatReport(r.report);
            toolCallsLabel.textContent = `${r.tool_calls} tool calls made autonomously`;
            reportSection.classList.add("visible");
            reportSection.scrollIntoView({ behavior: "smooth" });
        }

        loadHistory();

        async function runResearch() {
            const input = document.getElementById("goalInput");
            const btn = document.getElementById("researchBtn");
            const reportSection = document.getElementById("reportSection");
            const reportBody = document.getElementById("reportBody");
            const toolCallsLabel = document.getElementById("toolCallsLabel");

            const goal = input.value.trim();
            if (!goal) {
                setStatus("Please enter a research goal.", true);
                return;
            }

            btn.disabled = true;
            reportSection.classList.remove("visible");
            setStatus("Agent is researching. This may take 20-30 seconds...");

            try {
                const response = await fetch("/research", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ goal: goal })
                });

                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.error || "Something went wrong.", true);
                    return;
                }

                reportBody.innerHTML = formatReport(data.report);
                toolCallsLabel.textContent = `${data.tool_calls} tool calls made autonomously`;
                reportSection.classList.add("visible");
                setStatus("");
                loadHistory();

            } catch (err) {
                setStatus("Could not connect to the server. Make sure the app is running.", true);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
